version: "3"

tasks:
  build:
    desc: Build the st binary
    cmds:
      - go build -o st ./cmd/st/

  test:
    desc: Run all tests
    cmds:
      - go test ./... -count=1

  test:verbose:
    desc: Run all tests with verbose output
    cmds:
      - go test ./... -v -count=1

  test:e2e:
    desc: Run E2E tests only
    cmds:
      - go test ./cmd/st/ -v -count=1

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  check:
    desc: Build, test, and lint
    cmds:
      - task: build
      - task: test
      - task: lint

  install:
    desc: Install st to $GOPATH/bin
    cmds:
      - go install ./cmd/st/

  install:tools:
    desc: Install development tools
    cmds:
      - go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
