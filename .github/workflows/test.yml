name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run unit tests with coverage
        run: |
          mkdir -p .cover/e2e
          go test $(go list ./... | grep -v /cmd/st) -v -count=1 -coverprofile=.cover/unit.cov

      - name: Run E2E tests with binary coverage
        run: ST_COVER_DIR=.cover/e2e go test ./cmd/st/ -v -count=1

      - name: Merge coverage profiles
        run: |
          go tool covdata textfmt -i=.cover/e2e -o=.cover/e2e.cov
          awk '
            FNR==1 && /^mode:/ { if (!m) { m=$0; print } next }
            { k=$1 " " $2; if($3+0 >= c[k]+0) c[k]=$3+0 }
            END { for(k in c) print k, c[k] }
          ' .cover/unit.cov .cover/e2e.cov > .cover/merged.cov

      - name: Calculate coverage percentage
        if: github.ref == 'refs/heads/main'
        id: coverage
        run: |
          COVERAGE=$(go tool cover -func=.cover/merged.cov | grep total | awk '{print $3}' | sed 's/%//')
          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ secrets.GIST_ID }}
          filename: staccato-coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.percentage }}%
          valColorRange: ${{ steps.coverage.outputs.percentage }}
          minColorRange: 0
          maxColorRange: 100
