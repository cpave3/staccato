name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o st-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/st

      - uses: actions/upload-artifact@v4
        with:
          name: st-${{ matrix.goos }}-${{ matrix.goarch }}
          path: st-${{ matrix.goos }}-${{ matrix.goarch }}
